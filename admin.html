<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Painel Admin - SCFP</title>

    <!-- CSS do sistema -->
    <link rel="stylesheet" href="css/admin.css" />

    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  </head>

  <body>
    <div class="layout">
      <!-- MENU -->
      <div class="sidebar">
        <h2>SCFP</h2>

        <button onclick="mostrarSecao('usuarios')">👥 Usuários</button>
        <button onclick="mostrarSecao('frases')">💬 Frases</button>
      </div>

      <!-- CONTEÚDO -->
      <div class="conteudo">
        <div id="secaoUsuarios">
          <div class="card card-planos">
            <div class="tituloPrincipal">Painel Administrativo SCFP</div>
            <div class="tituloSecundario">Controle de usuários</div>

            <input id="novoEmail" placeholder="Email do usuário" />
            <button class="btn-principal" onclick="criarUsuario()">
  Criar usuário
</button>

            <div id="resultado"></div>

            <h3 class="titulo-lista">
  Usuários criados (<span id="totalUsuarios">0</span>)
</h3>

            <input
              type="text"
              id="buscaUsuario"
              placeholder="🔍 Buscar por email..."
              oninput="filtrarUsuarios()"
            />

            
             <div class="tabela">





  <!-- HEADER FIXO -->
  <div class="linha header">
    <div>Email</div>
    <div>Status</div>
    <div>Ações</div>
  </div>

  <!-- SCROLL SOMENTE NAS LINHAS -->
  <div class="container-lista">
    <div id="listaUsuarios" class="lista-usuarios"></div>
</div>

</div>
</div>

<!-- ============================= -->
<!-- 🔥 GESTÃO DE PLANOS -->
<!-- ============================= -->
<div class="card">
  <div class="tituloPrincipal">Planos e Valores</div>
  <div class="tituloSecundario">Controle de preços</div>

  <div id="lista-planos"></div>
</div>

</div> <!-- FECHA secaoUsuarios -->
</div>

        

    <!-- JS DO PAINEL -->
    <script src="js/alertas.js"></script>
    <script src="js/admin.js"></script>

    <!-- 🔹 POPUP AVISO -->
    <div id="popupAviso" class="popupAviso" style="display: none">
      <div class="popupBox">
        <h3>⚠ Atenção</h3>

        <p id="mensagemAviso"></p>

        <div class="acoesExcluir">
          <button onclick="fecharAviso()" style="width: 100%">OK</button>
        </div>
      </div>
    </div>

    <!-- 🔹 POPUP CONFIRMAÇÃO -->
    <div id="popupConfirmar" class="popupAviso" style="display: none">
      <div class="popupBox">
        <h3>⚠ Confirmação</h3>

        <p id="mensagemConfirmar"></p>

        <div style="display: flex; gap: 10px">
          <button
            onclick="confirmarAcao()"
            style="flex: 1; background: #10b981"
          >
            Confirmar
          </button>

          <button
            onclick="fecharConfirmacao()"
            style="flex: 1; background: #e53935"
          >
            Cancelar
          </button>
        </div>
      </div>
    </div>

    <!-- 🔹 POPUP EDITAR -->
    <div id="popupEditar" class="popupAviso" style="display: none">
      <div class="popupBox">
        <h3>✏ Editar usuário</h3>

        <input
          type="text"
          id="inputEditarEmail"
          placeholder="Novo email"
          style="width: 100%; padding: 10px; margin: 10px 0"
        />

        <div style="display: flex; gap: 10px">
          <button onclick="salvarEdicao()" style="flex: 1; background: #10b981">
            Salvar
          </button>

          <button onclick="fecharEditar()" style="flex: 1; background: #e53935">
            Cancelar
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
